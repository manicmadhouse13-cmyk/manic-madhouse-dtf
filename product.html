<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>
body{
font-family:Arial;
background:#0a0a0f;
color:white;
margin:0;
text-align:center;
}

.container{
padding:40px 20px;
}

img{
max-width:90%;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

img:hover{
transform:scale(1.05);
}

select{
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

button{
background:linear-gradient(90deg,#ff007a,#7b2cff);
border:none;
color:white;
padding:12px 20px;
margin-top:15px;
border-radius:8px;
cursor:pointer;
}

a{
display:block;
margin-top:20px;
color:#ff007a;
}
</style>
</head>

<body>

<div class="container">

<img id="product-image">
<h2 id="product-name"></h2>

<p>Select Size:</p>

<select id="size">
<option value="10">Pocket - $10</option>
<option value="15">Medium - $15</option>
<option value="20">Large - $20</option>
<option value="25">Oversize - $25</option>
</select>

<button onclick="addToCart()">Add to Cart</button>

<a href="index.html">⬅ Back</a>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const name = params.get("name");
const image = params.get("image");

document.getElementById("product-name").innerText = name;
document.getElementById("product-image").src = image;

function addToCart(){
let sizeSelect = document.getElementById("size");
let price = Number(sizeSelect.value);
let sizeText = sizeSelect.options[sizeSelect.selectedIndex].text;

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let existing = cart.find(item => item.name === name && item.size === sizeText);

if(existing){
existing.qty++;
} else {
cart.push({name, price, size: sizeText, qty:1});
}

localStorage.setItem("cart", JSON.stringify(cart));

alert("Added to cart!");
}
</script>

</body>
</html>
